services:
  db:

    image: postgres:latest
    environment:

      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bibliotecaviva

    ports:
      - "5432:5432"
    volumes:
      - ./docker-initial-sql.sql:/docker-entrypoint-initdb.d/docker-initial-sql.sql
      - db_data:/var/lib/postgresql
volumes:
    db_data: