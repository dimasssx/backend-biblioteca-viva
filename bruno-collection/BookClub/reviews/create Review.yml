info:
  name: create Review
  type: http
  seq: 1

http:
  method: POST
  url: "{{api_url}}bookclub/{{bookclub_id}}/comments"
  body:
    type: json
    data: |-
      {
        "content": "MUDOU MINHA VIDA.",
        "rating": 5
      }
  auth: inherit

runtime:
  variables:
    - name: bookclub_id
      value: 22222222-2222-2222-2222-222222222002

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
